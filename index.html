<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Chart Maker — IELTS Task 1 Practice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
<style>
  :root {
    --bg: #fafaf8;
    --ink: #1c1c1c;
    --accent: #d94f30;
    --line: #e2e0da;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 24px;
    max-width: 720px;
    margin-inline: auto;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 4px;
  }
  p.sub {
    color: #666;
    margin-top: 0;
    font-size: 14px;
    margin-bottom: 20px;
  }
  #rows { margin-bottom: 12px; }
  .row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .row input {
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
  }
  .row input.label { flex: 2; }
  .row input.value { flex: 1; }
  .row button {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 16px;
    padding: 0 8px;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  button.action {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  select {
    padding: 9px 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
    font-size: 14px;
  }
  #chart { margin-top: 10px; }
  #stats {
    margin-top: 16px;
    padding: 14px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
  }
  #stats b { color: var(--accent); }
</style>
</head>
<body>

<h1>Mini Chart Maker</h1>
<p class="sub">Add your data below, pick a chart type, and generate. Use the stats panel to help write your Task 1 sentences.</p>

<div id="rows"></div>
<div class="controls">
  <button class="secondary" onclick="addRow()">+ Add row</button>
  <select id="chartType">
    <option value="bar">Bar chart</option>
    <option value="pie">Pie chart</option>
  </select>
  <button class="action" onclick="renderChart()">Generate chart</button>
</div>

<div id="chart"></div>
<div id="stats"></div>

<script>
function addRow(label = '', value = '') {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <input class="label" placeholder="Category (e.g. Coffee)" value="${label}">
    <input class="value" type="number" placeholder="Value (e.g. 45)" value="${value}">
    <button onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('rows').appendChild(row);
}

// start with 4 blank rows
for (let i = 0; i < 4; i++) addRow();

function renderChart() {
  const rows = document.querySelectorAll('#rows .row');
  const labels = [];
  const values = [];
  rows.forEach(r => {
    const l = r.querySelector('.label').value.trim();
    const v = parseFloat(r.querySelector('.value').value);
    if (l && !isNaN(v)) {
      labels.push(l);
      values.push(v);
    }
  });

  if (labels.length === 0) {
    document.getElementById('stats').innerHTML = 'Add at least one row with a category and a number.';
    return;
  }

  const type = document.getElementById('chartType').value;
  const total = values.reduce((a, b) => a + b, 0);

  let data, layout;
  if (type === 'bar') {
    data = [{
      x: labels,
      y: values,
      type: 'bar',
      marker: { color: '#d94f30' }
    }];
    layout = {
      margin: { t: 20, l: 40, r: 20, b: 60 },
      height: 320,
      font: { family: 'Helvetica Neue, Arial, sans-serif', size: 12 }
    };
  } else {
    data = [{
      labels: labels,
      values: values,
      type: 'pie',
      marker: { colors: ['#d94f30', '#e8a33d', '#4a7c6f', '#6b8caf', '#b56576', '#9c89b8'] }
    }];
    layout = {
      margin: { t: 20, l: 20, r: 20, b: 20 },
      height: 320,
      font: { family: 'Helvetica Neue, Arial, sans-serif', size: 12 }
    };
  }

  Plotly.newPlot('chart', data, layout, { displayModeBar: false });

  // stats summary to help with sentence-writing
  const sorted = labels.map((l, i) => ({ label: l, value: values[i], pct: (values[i] / total * 100) }))
                        .sort((a, b) => b.value - a.value);

  let html = `<b>Total:</b> ${total}<br><b>Most common:</b> ${sorted[0].label} (${sorted[0].pct.toFixed(1)}%)<br><b>Least common:</b> ${sorted[sorted.length-1].label} (${sorted[sorted.length-1].pct.toFixed(1)}%)<br><br><b>Breakdown:</b><br>`;
  sorted.forEach(s => {
    html += `${s.label}: ${s.value} (${s.pct.toFixed(1)}%)<br>`;
  });
  document.getElementById('stats').innerHTML = html;
}
</script>

</body>
</html>
